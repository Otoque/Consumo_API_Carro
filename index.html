<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carro Aleatório</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

    <!-- ESQUERDA -->
    <div class="coluna esquerda">

        <div class="card">
            <h3>Informações Básicas</h3>
            <p id="vinCar"></p>
        </div>

        <div class="card">
            <h3>Motor</h3>
            <p id="motorCar"></p>
        </div>

    </div>

    <!-- CENTRO -->
    <div class="centro">
        <img id="carImage" src="" alt="Imagem do carro">
    </div>

    <!-- DIREITA -->
    <div class="coluna direita">

        <div class="card">
            <h3>Potência</h3>
            <p id="potenciaCar"></p>
        </div>

        <div class="card">
            <h3>Combustível</h3>
            <p id="combustivelCar"></p>
        </div>

        <div class="card">
            <h3>Fabricante</h3>
            <p id="fabricanteCar"></p>
        </div>

    </div>
<div class="botao">
    <button onclick="searchCar()">Buscar Carro</button>
</div>
    


</div>

<script src="script.js"></script>

</body>
</html>
